<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Red+Rose:wght@300..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<title>MYSM INDIA || Registration Slip</title>

<style>
/* ===================== RESET & BASE ===================== */
*{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
body{ font-family: Arial, sans-serif; background:#f4f6f9; }

/* ===================== HEADER ===================== */
.page_header{
    background: linear-gradient(135deg,#0d6efd,#0047ab);
    color:white; padding:30px 15px; text-align:center;
}
.page_header h1{ font-size: clamp(22px,5vw,36px); font-family: "Red Rose", serif; }

/* ===================== FORM BOX ===================== */
.result_container{
    width:90%; max-width:1000px; margin:50px auto; background:white; padding:30px;
    border-radius:15px; box-shadow:0 5px 20px rgba(0,0,0,0.1); text-align:center;
}
.result_container h3{
    margin-bottom:20px;
    color:#0d6efd;
    font-size: clamp(16px,3vw,24px);
}
.inputGroup{
  margin-bottom: 15px;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  flex-direction: column;
}
.inputGroup label {
  font-size: clamp(14px,3vw,20px);
  color:#0d6efd;
  margin: 0 0 3px 2px;
  font-weight: bold;
}

input, select{ width:100%; height:40px; padding:10px; font-size: clamp(10px,3vw,16px); border:1px solid #ccc; border-radius:8px; background-color: #fff;}

.dobContainer input{ margin-bottom: 0px; }


.dobContainer{
  width: 100%;
  height: 100%;
  /* border: 1px solid  red; */
  position: relative;
}

.dobContainer span{
  color: #757575;
  font-size: clamp(10px,3vw,16px);
  display: inline-block;
  position: absolute;
  left: 13px;
  top: 50%;
  transform: translateY(-50%);
  pointer-events: none; /* Span par click nahi hoga */
  transition: 0.2s ease all;
}
.dobContainer.filled span {
  display: none;
}



button{
    padding:12px 25px; background:#0d6efd; color:white; border:none; border-radius:8px;
    cursor:pointer; font-weight:bold; margin:5px auto; display:block; 
}

/* ===================== RESULT OUTPUT ===================== */
.result_output{ margin-top:20px; display:none; }


/* ===================== RESULT OUTPUT ===================== */
.result_output{
    margin-top:20px;
    padding:0px;
    border-radius:10px;
    display:none; /* Initially hidden */
    text-align:left;
}
.result_output .pass{
    background:#F0F8FF; /* Success background */
}

.result_output .fail{background:#fdeaea;
  color:#b30000;
  font-weight:bold;
  font-size:clamp(14px,3vw,18px);
  text-align:center;
  padding:30px 20px;
  min-height:70px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:2px solid #b30000;
  border-radius: 8px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  
}


/* ===================== MAIN CONTAINER (SAME AS ADMIT CARD) ===================== */
.result_Main_Container{width:95%; max-width:1200px; border:1px solid #333333; border-radius:8px; overflow:hidden; margin:20px auto; background:#fff; }
.result_header{ text-align:center; background: linear-gradient(135deg,#0d6efd,#0047ab); color:white; padding:15px; }
.result_header h2{ font-size: clamp(30px,3vw,45px); font-family:"Red Rose", serif; margin:0; }
.result_header p{ font-size: clamp(14px,3vw,20px); font-weight:bold; margin-top:5px; }
.result_header h3{ font-size: clamp(14px,3vw,20px); color:#fff; }

/* ===================== PERSONAL DETAILS SECTION (RED THEME)) ===================== */
.studentsPersonalDetailSection{ width: calc(100% - 20px); margin:10px; border: 1px solid red; }
.studentsPersonalHeading{ background-color:red; color:#fff; font-family:"Red Rose", serif; padding:10px; text-align:center; font-weight:bold; text-transform:uppercase;}
.detailsPicSignQrBox{ display:flex; padding:5px; gap:5px; }
#studentDetailsTable{ flex:1; border-collapse:collapse; }
#studentDetailsTable th, #studentDetailsTable td{ border:1px solid #ccc; padding:8px; font-size:14px; text-align:left; }
#studentDetailsTable th{ background:#f9f9f9; width:30%; }

.photo_sign_qr_Box{ width:144px; display:flex; flex-direction:column; gap:10px; }
.studentImage, .studentSign, .studentQRdata{ border:1px solid #ccc; width:100%; display:flex; justify-content:center; align-items:center; 
  padding: 2px;
}
.studentImage{ height:180px; } .studentSign{ height:50px; } .studentQRdata{ height:144px; padding:2px;}
.studentImage img, .studentSign img, .studentQRdata img{ width:100%; height:100%; object-fit:contain; }

/* ===================== MARK DETAILS SECTION (GREEN THEME) ===================== */
.examDetailSection{ width: calc(100% - 20px); margin:10px; border:1px solid #198754; }
.examDetailSectionHeading{ background-color:#198754; color:#fff; font-family:"Red Rose", serif; padding:10px; text-align:center; font-weight:bold; text-transform:uppercase; }
.examDetailsTable{ width:calc(100% - 10px); border-collapse:collapse; margin:5px;}
.examDetailsTable th{ border:1px solid #dede; padding:8px; font-size:13px; text-align:center; }
.examDetailsTable td{ border:1px solid #dede; padding:5px; font-size:13px; text-align:center; }
.examDetailsTable th{ background:#b2ffdb; }
.examDetailsTable tr td:nth-child(2), .examDetailsTable tr th:nth-child(2){ text-align:left; padding-left:10px; padding-right:10px; }
.examDetailsTable tr td:nth-child(6), .examDetailsTable tr th:nth-child(6){ text-align:left; padding-left:15px; padding-right:15px; }
.categoryCell div { display: inline-block; width: 45%; }

/* ===================== RESUL SUMMARY SECTION (BLUE THEME) ===================== */
.summaryContainer{ width: calc(100% - 20px); margin:10px; border: 1px solid #0d6efd; display:flex; gap:0px; flex-direction: column;}
.resultSummaryHeading{font-family: "Red Rose", serif; width: calc(100% - 0px); padding:10px; color: #fff;; font-weight: bold; text-align:center; text-transform:uppercase; background-color:#0d6efd; display: flex; align-items: center; justify-content: center; }
.summaryBox{ flex:1; border: 1px solid #0d6efd; border-radius:4px; overflow:hidden; }
.summaryHeading{ background:#0d6efd; color:#fff; padding:6px; text-align:center; font-weight:bold; font-size:13px; }

.summaryBothBox{display:flex; gap:5px; margin:5px; }
.summaryTable{ width:100%; border-collapse:collapse; }
.summaryTable td{ border:1px solid #eee; padding:10px; font-size:13px; text-align:center; }
.summaryTable td.label{ font-weight:bold; background:AliceBlue; width:50%; }

/* ===================== PRINCIPAL & EXAM CONTROLAR ===================== */
.principal_controlar_sign_box{ width: calc(100% - 20px); margin:10px 10px; display:flex; justify-content:space-between; gap:10px; }
.signBox{ width:180px; text-align:center; }
.signBox img{ width:100%; height:60px; object-fit:contain; }
.signBox p{ font-weight:bold; font-size:11px; border-top:1px solid #000; padding-top:5px; text-transform:uppercase; }


.reg_footer_note { width:calc(100% - 20px); padding: 15px; font-size: clamp(10px,3vw,16px); font-style: italic; margin:10px;
  background: #FFFAFA;
  border: 1px solid #eb3d4e;
  color: #dc3545;
}
.reg_footer_note span{
  color: #eb3d4e;
  font-weight: bold;
}



/* ===================== Footer ===================== */
.footer-X {
    background:#323232;
    color:#fff;
    margin-top:40px;
}

.footer-top {
    max-width:1100px;
    margin:auto;
    padding:40px 20px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:40px;
}

.footer-brand h2 {
    font-size: clamp(16px, 4vw, 36px);
    font-family: "Red Rose", serif;
}

.footer-brand p {
    margin-top:10px;
    font-size: clamp(12px, 1.5vw, 18px);
    line-height:1.6;
}

.footer-links h3 {
    color:#fff;
    margin-bottom:12px;
    font-size: clamp(16px, 1.5vw, 28px);
}

.footer-links ul {
    list-style:none;
}

.footer-links ul li {
    margin-bottom:10px;
}

.footer-links ul li a {
    color:#fff;
    text-decoration:none;
    font-size: clamp(12px,1.5vw,16px);
    opacity:0.9;
    transition:0.3s;
}

.footer-links ul li a:hover{
    opacity:1;
    text-decoration:underline;
}

.footer-bottom{
    text-align:center;
    padding:15px 10px;
    background: rgba(0,0,0,0.15);
    font-size:13px;
}

/* ===== Responsive ===== */
@media(max-width:768px){
    .footer-top{
        grid-template-columns:1fr;
        text-align:center;
    }

    .footer-links ul li{
        display:inline-block;
        margin:6px 12px;
        text-align:left;
    }

    .page_container{
        gap:15px;
        padding:15px;
    }
}




@media print {
    @page {
        size: A4 portrait;
        margin: 5mm 16mm;
    }

    html, body {
        width: 210mm;
        height: 297mm;
        margin: 0;
        padding: 0;
        background: #ffffff !important;
    }

    * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
    }

    body * {
        visibility: hidden;
    }

    .result_output,
    .result_output * {
        visibility: visible;
    }

    .result_output {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: flex-start;
    }

    .result_Main_Container {
        width: 100%;
        max-width: 100%;
        /* Dynamic scaling to fit one page exactly */
        transform: scale(calc(1 - ((document.body.scrollHeight - 1120)/2000)));
        transform: scale(1);
        transform-origin: top center;
    }

    .printBtn {
        display: none;
    }

    /* Reduce padding and font slightly for tables to ensure fit */
    .examDetailsTable th, .examDetailsTable td,
    #studentDetailsTable th, #studentDetailsTable td,
    .summaryTable td {
        padding: 8px 4px !important;
        font-size: 11px !important;
    }
    
    .examDetailsTable tr td:nth-child(6),
    .examDetailsTable tr th:nth-child(6){
        text-align:left !important;
        padding-left:15px !important;
        padding-right:15px !important;
    }
    
    .summaryBothBox{
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .studentImage, .studentSign, .studentQRdata img {
        max-height: 144px !important;
    }
/* ===== FORCE DESKTOP LAYOUT IN PRINT ===== */

.detailsPicSignQrBox{
    flex-direction: row !important;
    align-items: stretch !important;
}

.photo_sign_qr_Box{
    width:144px !important;
    max-width:144px !important;
}

.examDetailSection{
    overflow-x: visible !important;
}

.examDetailsTable{
    display: table !important;
    width: calc(100% - 10px) !important;
    white-space: normal !important;
}

.summaryBothBox{
    flex-direction: row !important;
}
}


/* ===================== MOBILE ===================== */
@media (max-width:768px){
    .detailsPicSignQrBox{flex-direction:column; align-items:center;}
    #studentDetailsTable{width:calc(100%);}
    .photo_sign_qr_Box{
      display: flex; flex-direction: column;
      width:100%; max-width:100%;}
    .summaryBox{
      display: flex;
      flex-direction: column;
    }
/* ===================== SCROLLABLE MARKS TABLE ON MOBILE ===================== */
.examDetailSection{
  overflow-x: auto;
}
.examDetailSectionHeading{
  width: 100%;
}

.examDetailsTable {
  width: calc(100% - 10px); /* minimum width so it can scroll */
  display: block;      /* ब्लॉक बना दो ताकि scroll काम करे */
  overflow-x: auto;    /* horizontal scroll */
  white-space: nowrap; /* कॉलम एक लाइन में रहें */
}
.summaryBothBox{
  display: flex;
  flex-direction: column;
  gap: 5px;
}


}



</style>


</head>
<body>

<div class="page_header">
    <h1>REGISTRATION PORTAL</h1>
</div>

<div class="result_container">
    <h3>Enter Student Details to Download Slip</h3>
    
    <div class="inputGroup">
      <select id="aSession">
        <option value="" selected disabled>Select Academic Session</option>
        <option value="2025-26">2025-26</option>
        <option value="2026-27">2026-27</option>
      </select>
    </div>
    
    <div class="inputGroup">
     <!-- <label>Full Name</label> -->
      <input type="text" id="sName" placeholder="Enter Candidate Name">
    </div>
      
    <div class="inputGroup">
      <!-- <label>Phone Number</label> -->
      <input type="number" id="sPhone" placeholder="Enter Registered Mobile Number">
    </div>
    
    <div class="inputGroup">
        <!-- <label>Date Of Birth</label> -->
        <div class="dobContainer" id="dobWrapper">
            <input type="date" id="dob">
            <span id="dobPlaceholder">DD/MM/YYYY</span>
        </div>
    </div>    
    
    <button onclick="viewRegistrationSlip()">View Registration Slip</button>
    <div id="resultBox" class="result_output"></div>
</div>


<script>
/* ================= READYMADE DATABASE (STATIC) ================= */
var studentsDB = [
{session:"2025-26", uniqueid:"25261045714001", SCN:"33002 - MYSM India", registration:"251045714001", roll:"251045714001", name:"Pritam Kumar", father:"Pappu Sahni", mother:"Yashoda Devi", address:"Samastipur", aadhaar:"453461232053", dob:"2005-12-01", gender:"Male", caste:"EBC", disabled:"Yes", phone:"6203719952", whatsapp:"6203719952", email:"chartscloud@gmail.com", joining:"2025-02-26", imageLink:"https://drive.google.com/thumbnail?id=1N-H1Lbh55jUCN0wjGek15qk0KyVJaYDo&sz=w1000", signatureLink:"https://drive.google.com/thumbnail?id=1dMgy2iSPT2Ky_y8TMDDFI_8VojfWmjzM&sz=w1000", amount:"1250", transId:"T2602261324519856498125", status:"Paid"},
{session:"2025-26", uniqueid:"25261045714002", SCN:"33002 - MYSM India", registration:"251045714002", roll:"251045714002", name:"Aayush Kumar", father:"Mahesh Raghavan", mother:"Sarita Devi", address:"Samastipur", aadhaar:"620371995201", dob:"2012-02-27", gender:"Male", caste:"EBC", disabled:"No", phone:"6203719952", whatsapp:"6203719952", email:"example@gmail.com", joining:"2025-02-26", imageLink:"https://drive.google.com/thumbnail?id=1jL0YaQvIt7IZJEqfzf5D2yuGYuce4tdU&sz=w1000", signatureLink:"https://drive.google.com/thumbnail?id=1Us9x9NxXb7fC9i6Bv8yolAL9TGD_Rc9c&sz=w1000", amount:"1250", transId:"T2602261324519856498126", status:"Paid"},
{session:"2025-26", uniqueid:"25261045719003", SCN:"33002 - MYSM India", registration:"251045719003", roll:"251045719003", name:"Aarushi Ravat", father:"Sanjay Gupta", mother:"Rani Devi", address:"Sahebpur Kamal", aadhaar:"620371995202", dob:"2012-02-28", gender:"Female", caste:"EBC", disabled:"No", phone:"8763887553", whatsapp:"8763887557", email:"royalaaruhi@gmail.com", joining:"2025-03-03", imageLink:"https://drive.google.com/thumbnail?id=1DHBv_7KsOliRPJ73iYxxlZ9KzhprHrEs&sz=w1000", signatureLink:"https://drive.google.com/thumbnail?id=1qGUGPbaXk3LLMLEOWOJMfV-wgBBHnleZ&sz=w1000", amount:"1250", transId:"T2602261324519856498127", status:"Paid"}
];

/* =============================================== */
/* ========== DOB Placeholder Animation ========== */
/* =============================================== */
const dobInput = document.getElementById('dob');
const dobWrapper = document.getElementById('dobWrapper');
dobInput.addEventListener('input', function() {
    this.value ? dobWrapper.classList.add('filled') : dobWrapper.classList.remove('filled');
});
/* =============================================== */


function viewRegistrationSlip(){
    var session = document.getElementById("aSession").value;
    var name = document.getElementById("sName").value.trim();
    var phone = document.getElementById("sPhone").value.trim();
    var dob = document.getElementById("dob").value;
    var resultBox = document.getElementById("resultBox");

    // ===== ADVANCED FIELD VALIDATION =====
    
    // अगर एक भी field भरा नहीं है
    if(!session && !name && !phone && !dob){
        Swal.fire({
            title: '<span style="color:#0d6efd">MYSM India says</span>',
            text: 'All fields are required!',
            icon: 'warning',
            iconColor: '#ff2424',
            confirmButtonText: 'CLOSE !',
            confirmButtonColor: '#0d6efd'
        });
        return;
    }
    
    // Individual field alerts
    if(!session){
        Swal.fire({
            title: 'Academic Session Required',
            text: 'Please select academic session.',
            icon: 'warning',
            iconColor: '#ff2424',
            confirmButtonText: 'CLOSE !',
            confirmButtonColor: '#0d6efd'
        });
        return;
    }
    
    if(!name){
        Swal.fire({
            title: 'Name Required',
            text: 'Please enter candidate name.',
            icon: 'warning',
            iconColor: '#ff2424',
            confirmButtonText: 'CLOSE !',
            confirmButtonColor: '#0d6efd'
        });
        return;
    }
    
    if(!phone){
        Swal.fire({
            title: 'Mobile Number Required',
            text: 'Please enter registered mobile number.',
            icon: 'warning',
            iconColor: '#ff2424',
            confirmButtonText: 'CLOSE !',
            confirmButtonColor: '#0d6efd'
        });
        return;
    }
    
    if(!dob){
        Swal.fire({
            title: 'Date of Birth Required',
            text: 'Please select date of birth.',
            icon: 'warning',
            iconColor: '#ff2424',
            confirmButtonText: 'CLOSE !',
            confirmButtonColor: '#0d6efd'
        });
        return;
    }

    // Matching from Static Database
    var s = studentsDB.find(item => 
        item.session === session &&
        item.name.toLowerCase() === name.toLowerCase() &&
        item.phone === phone &&
        item.dob === dob
    );
    
    
    if(!s){
        resultBox.style.display="block";
        resultBox.innerHTML="<div class='fail'>Invalid Details! No Registration Found.</div>";
        return;
    }

    // Build UI
    resultBox.style.display="block";
    resultBox.innerHTML = `
    <div class="result_Main_Container">
        <div class="result_header">
            <h2>MYSM India</h2>
            <p>SAMASTIPUR, S.KAMAL, BGS (851217)</p>
            <hr color="#fff" size="1" style="margin:10px 0;">
            <h3>REGISTRATION SLIP - ${s.session}</h3>
        </div>

        <div class="studentsPersonalDetailSection">
            <div class="studentsPersonalHeading">Registered Details for ${s.name}</div>
            <div class="detailsPicSignQrBox">
                <table id="studentDetailsTable">
                    <tr><th>Academic Session</th><td><strong>${s.session}</strong></td></tr>
                    <tr><th>MYSM Unique ID</th><td><strong>${s.uniqueid}</strong></td></tr>
                    <tr><th>Registration No.</th><td>${s.registration}</td></tr>
                    <tr><th>Institute Name</th><td>${s.SCN}</td></tr>
                    <tr><th>Roll Number</th><td>${s.roll}</td></tr>
                    <tr><th>Candidate Name</th><td>${s.name}</td></tr>
                    <tr><th>Father's Name</th><td>${s.father}</td></tr>
                    <tr><th>Mother's Name</th><td>${s.mother}</td></tr>
                    <tr><th>Phone Number</th><td>${s.address}</td></tr>
                    <tr><th>Aadhaar Number</th><td>${s.aadhaar}</td></tr>
                    <tr><th>Date of Birth</th><td>${new Date(s.dob).toLocaleDateString('en-GB')}</td></tr>
                    <tr><th>Gender</th><td>${s.gender}</td></tr>
                    
                    <tr>
                      <th>Category</th>
                      <td class="categoryCell">
                        <div>(a) Caste : <strong>${s.caste}</strong></div>
                        <div>(b) Disabled : <strong>${s.disabled}</strong></div>
                      </td>
                    </tr>
                    
                    <tr><th>Phone Number</th><td>${s.phone}</td></tr>
                    <tr><th>WhatsApp Number</th><td>${s.whatsapp}</td></tr>
                    <tr><th>Email Address</th><td>${s.email}</td></tr>
                    <tr><th>Admission Date</th><td>${new Date(s.joining).toLocaleDateString('en-GB')}</td></tr>
                    <tr><th>Payable Amount</th><td>₹${s.amount}.00</td></tr>
                    <tr><th>Transaction ID</th><td>${s.transId}</td></tr>
                    <tr><th>Payment Status</th><td><span style="color:#198754; font-weight:bold;">${s.status}</span></td></tr>
                    
                </table>
                
                <div class="photo_sign_qr_Box">
                    <div class="studentImage"><img src="${s.imageLink}"></div>
                    <div class="studentSign"><img src="${s.signatureLink}"></div>
                    <div class="studentQRdata"><img src="https://quickchart.io/qr?size=150&text=${encodeURIComponent(s.registration)}"></div>
                </div>
            </div>
        </div>
        <div class="reg_footer_note">
            <span>Note :-<br></span>
                This is a computer-generated registration slip for verification purposes only. 
                Please report any discrepancies to the office immediately.
                (यह सिर्फ़ वेरिफ़िकेशन के लिए कंप्यूटर से बनी रजिस्ट्रेशन स्लिप है। अगर कोई गड़बड़ी हो, तो तुरंत ऑफ़िस में रिपोर्ट करें।)
        </div>
    </div>
    <center><button class="printBtn" style="background:#0d6efd; margin-top:10px;" onclick="window.print()">Download Registration Slip</button></center>
    `;
}
</script>

</body>
</html>
